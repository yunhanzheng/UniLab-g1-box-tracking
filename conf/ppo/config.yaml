defaults:
  - _self_
  - task: go1_joystick_flat/mujoco

algo:
  algo: ppo
  algo_log_name: rsl_rl_ppo
  seed: 1
  num_envs: 4096
  num_steps_per_env: 24
  max_iterations: 101
  save_interval: 100
  empirical_normalization: false
  runner_class_name: OnPolicyRunner
  obs_groups:
    default:
      - policy
  experiment_name: test
  run_name: ""
  resume: false
  load_run: "-1"
  checkpoint: -1
  resume_path: null
  policy:
    init_noise_std: 1.0
    actor_hidden_dims: [512, 256, 128]
    critic_hidden_dims: [512, 256, 128]
    activation: elu
    class_name: ActorCritic
  algorithm:
    class_name: unilab.algos.torch.rsl_rl_ppo:FinalObservationAwarePPO
    value_loss_coef: 1.0
    use_clipped_value_loss: true
    clip_param: 0.2
    entropy_coef: 0.01
    num_learning_epochs: 5
    num_mini_batches: 4
    learning_rate: 1.0e-3
    schedule: adaptive
    gamma: 0.99
    lam: 0.95
    desired_kl: 0.01
    target_kl_stop: null
    max_grad_norm: 1.0
    adaptive_kl_beta: 0.9
    adaptive_lr_growth: 1.1
    adaptive_lr_decay: 1.2
    adaptive_lr_update_interval: 5
    metrics_interval: 8
    finite_check_interval: 8
    enable_compile: false
    warmup_strict_iters: 10
    warmup_metrics_interval: 2
    warmup_finite_check_interval: 2
    disable_finite_checks: true

training:
  task_name: Go1JoystickFlat
  device: null
  logger: tensorboard
  wandb_project: unilab
  wandb_entity: null
  wandb_group: null
  wandb_job_type: null
  wandb_name: null
  wandb_tags: []
  wandb_notes: null
  wandb_mode: null
  sim_backend: mujoco
  nan_guard:
    enabled: false
    buffer_size: 100
    max_envs_to_dump: 5
    output_dir: null
  play_only: false
  no_play: false
  play_env_num: 16
  render_spacing: 1.0
  play_steps: 200
  cam_distance: 6.0
  cam_elevation: -20.0
  cam_azimuth: 90.0
  cam_lookat: null
  cam_tracking: false
  cam_tracking_env_idx: 0
  cam_tracking_extra_envs: 2
  num_timesteps: null
  log_dir: null

interactive:
  action_mode: zero
  policy_obs_mode: auto
  show_target_bodies: false
  show_reward_debug: false
  target_show_axes: false
  target_body_names: ""
  target_max_bodies: 0
  target_marker_radius: 0.02
  target_axis_length: 0.08
  target_marker_alpha: 0.75
  reward_debug_show_velocity: false
  reward_debug_lin_vel_scale: 0.08
  reward_debug_ang_vel_scale: 0.05
  reward_debug_show_connectors: false
  reward_debug_show_global_anchor: false
  camera_follow_body: true
  camera_focus_body_name: ""
  camera_height_offset: 0.15
  camera_distance: null
  camera_elevation: null
  camera_azimuth: null
  use_env_visual_model: true

viser:
  port: 8080
  env_idx: 0
  display_mode: all
  max_envs: 16

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
  job_logging:
    root:
      handlers: [console]
