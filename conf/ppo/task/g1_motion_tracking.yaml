# @package _global_
defaults:
  - /reward@reward_motrix: g1_motion_tracking_motrix
  - override /reward: g1_motion_tracking_mujoco

training:
  task_name: G1MotionTracking
  play_steps: 1000
algo:
  num_envs: 1024
  # max_iterations: 5000
  max_iterations: 15000
  save_interval: 500
  obs_groups:
    default:
      - policy
    actor:
      - actor
  algorithm:
    entropy_coef: 0.005
motrix_play_only:
  enabled: true
  training_overrides:
    play_env_num: 128
  env_cfg_override:
    render_spacing: 2.5
  scene_override:
    enabled: true
    source_model_file: src/unilab/assets/robots/g1/scene_flat.xml
    ground_texture_file: src/unilab/assets/robots/g1/floor.png
    skybox_rgb1: [0.90, 0.90, 0.91]
    skybox_rgb2: [0.68, 0.68, 0.70]
    ground_texrepeat: [0.25, 0.25]
