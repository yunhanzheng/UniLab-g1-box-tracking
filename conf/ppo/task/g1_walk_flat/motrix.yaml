# @package _global_
training:
  task_name: G1WalkFlat
  sim_backend: motrix
algo:
  num_envs: 2048
  max_iterations: 2200
  empirical_normalization: true
  obs_groups:
    actor:
      - policy
    critic:
      - critic
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 5.0e-3
env:
  domain_rand:
    randomize_kp: false
    randomize_kd: false
  control_config:
    action_scale: 0.5
  commands:
    vel_limit:
      - [0.4, 0.0, 0.0]
      - [0.7, 0.0, 0.0]
  gait_phase_init_mode: offset_phase
  reset_base_qvel_limit: 0.05
  curriculum:
    enabled: false
  noise_config:
    level: 1.0
    scale_joint_angle: 0.01
    scale_joint_vel: 1.5
    scale_gyro: 0.2
reward:
  scales:
    tracking_lin_vel: 2.0
    tracking_ang_vel: 0.25
    forward_progress: 0.0
    under_speed: -0.2
    upper_body_pose: -0.05
    penalty_feet_ori: 0.0
    feet_phase: 1.2
    feet_phase_contrast: 1.5
    feet_phase_contact: 1.0
    feet_double_stance: -1.0
    lin_vel_z: -1.0
    ang_vel_xy: -0.2
    base_height: -120.0
    orientation: -2.5
    action_rate: -0.005
    pose: -0.05
  tracking_sigma: 0.25
  gait_frequency: 1.5
  feet_phase_swing_height: 0.09
  feet_phase_tracking_sigma: 0.008
  base_height_target: 0.765
  min_forward_speed_for_gait_reward: 0.05
  min_base_height: 0.5
  max_tilt_deg: 35.0
