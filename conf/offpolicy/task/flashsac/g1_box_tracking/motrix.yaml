# @package _global_
# G1 box tracking with FlashSAC on Motrix.
defaults:
  - /task/flashsac/g1_box_tracking/mujoco
  - _self_

training:
  sim_backend: motrix
  play_env_num: 16
  play_steps: 1000
play_profile:
  enabled: true
  env:
    render_spacing: 2.5
  scene:
    enabled: true
    source_model_file: src/unilab/assets/robots/g1/scene_flat_with_largebox.xml
    ground_texture_file: src/unilab/assets/robots/g1/textures/floor.png
    skybox_rgb1: [0.90, 0.90, 0.91]
    skybox_rgb2: [0.68, 0.68, 0.70]
    ground_texrepeat: [0.25, 0.25]
