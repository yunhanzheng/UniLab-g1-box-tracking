# @package _global_
# G1 box tracking with FlashSAC on MuJoCo.
training:
  task_name: G1BoxTracking
  sim_backend: mujoco
algo:
  num_envs: 2048
  max_iterations: 25000
  save_interval: 10000
  learning_starts: 98
  batch_size: 2048
  replay_buffer_n: 512
  updates_per_step: 4
  policy_frequency: 2
  gamma: 0.99
  tau: 0.05
  num_atoms: 501
  use_symmetry: false
env:
  control_config:
    action_scale: 2.0
  anchor_pos_z_threshold: 0.5
  ee_body_pos_z_threshold: 0.5
  truncate_on_clip_end: true
  noise_config:
    level: 1.0
    scale_joint_angle: 0.01
    scale_joint_vel: 1.5
    scale_gyro: 0.2
reward:
  scales:
    motion_global_root_pos: 1.0
    motion_global_root_ori: 0.5
    motion_body_pos: 2.0
    motion_body_ori: 1.0
    motion_body_lin_vel: 1.0
    motion_body_ang_vel: 1.0
    motion_joint_pos: 0.0
    motion_joint_vel: 0.0
    action_rate_l2: -0.1
    joint_limit: -2.0
    undesired_contacts: -0.1
    object_global_ref_position_error_exp: 4.0
    object_global_ref_orientation_error_exp: 3.0
  std_root_pos: 0.3
  std_root_ori: 0.4
  std_body_pos: 0.3
  std_body_ori: 0.4
  std_body_lin_vel: 1.0
  std_body_ang_vel: 3.14
  std_joint_pos: 0.2
  std_joint_vel: 1.0
  std_object_pos: 0.12
  std_object_ori: 0.2
