# @package _global_
# G1 Whole-Body Tracking (WBT) with FastSAC on MuJoCo.
# Hyperparameters aligned with holosoma g1-29dof-wbt-fast-sac.
training:
  task_name: G1MotionTrackingSAC
  sim_backend: mujoco
algo:
  num_envs: 2048
  max_iterations: 100000
  save_interval: 1000
  # --- holosoma WBT-specific overrides (vs sac.yaml defaults) ---
  gamma: 0.99
  tau: 0.05
  num_atoms: 501
  updates_per_step: 4
  policy_frequency: 2
  use_symmetry: false
  algo_params:
    alpha_init: 0.1
    target_entropy_ratio: 0.5
    max_grad_norm: 10.0
env:
  control_config:
    action_scale: 2.0
  anchor_pos_z_threshold: 0.5
  ee_body_pos_z_threshold: 0.5
reward:
  scales:
    motion_global_root_pos: 1.0
    motion_global_root_ori: 0.5
    motion_body_pos: 2.0
    motion_body_ori: 1.0
    motion_body_lin_vel: 1.0
    motion_body_ang_vel: 1.0
    motion_joint_pos: 0.0
    motion_joint_vel: 0.0
    action_rate_l2: -0.1
    joint_limit: -2.0
    undesired_contacts: -0.1
