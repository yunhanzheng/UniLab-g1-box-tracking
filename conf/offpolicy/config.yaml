defaults:
  - _self_
  - algo: sac
  - task: ${algo}/g1_walk_flat/mujoco

training:
  task_name: G1WalkFlat
  device: null
  logger: tensorboard
  wandb_project: unilab
  wandb_entity: null
  wandb_group: null
  wandb_job_type: null
  wandb_name: null
  wandb_tags: []
  wandb_notes: null
  wandb_mode: null
  sim_backend: mujoco
  num_gpus: 1
  use_amp: true
  play_only: false
  no_play: false
  play_render_mode: auto
  export_onnx: true
  play_env_num: 16
  play_steps: 800
  cam_distance: 6.0
  cam_elevation: -20.0
  cam_azimuth: 90.0
  log_root: null
  log_dir: null
  no_sync_collection: false
  env_steps_per_sync: 1
  trace_enabled: false
  trace_output_dir: null
  trace_thread_time: false
  trace_cuda_events: true
  replay_prefetch_mode: one_tick
  verbose_metrics: false
  resume: false

interactive:
  action_mode: zero
  policy_obs_mode: auto
  show_target_bodies: false
  show_reward_debug: false
  target_show_axes: false
  target_body_names: ""
  target_max_bodies: 0
  target_marker_radius: 0.02
  target_axis_length: 0.08
  target_marker_alpha: 0.75
  reward_debug_show_velocity: false
  reward_debug_lin_vel_scale: 0.08
  reward_debug_ang_vel_scale: 0.05
  reward_debug_show_connectors: false
  reward_debug_show_global_anchor: false
  camera_follow_body: true
  camera_focus_body_name: ""
  camera_height_offset: 0.15
  camera_distance: null
  camera_elevation: null
  camera_azimuth: null
  use_env_visual_model: true
  speed: 1.0
  start_paused: false
  keyboard: false
  keyboard_step_lin: 0.1
  keyboard_step_ang: 0.2

env:
  post_step_forward_sensor: false

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
  job_logging:
    root:
      handlers: [console]
